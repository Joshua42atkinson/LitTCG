<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitTCG Parent Progress Report</title>
  <style>
    :root {
      --bg: #0b0b12;
      --panel: #14141e;
      --text: #f0f0f5;
      --muted: #a0a0b0;
      --accent: #7c5cff;
      --accent-2: #ff7a45;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }
    h1 { text-align: center; margin-bottom: 0.5rem; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; }
    .upload {
      text-align: center;
      margin: 2rem 0;
    }
    input[type="file"] {
      padding: 0.8rem 1.2rem;
      background: var(--panel);
      color: var(--text);
      border: 2px dashed var(--accent);
      border-radius: 10px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: var(--panel);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card h2 { margin-top: 0; font-size: 1.1rem; color: var(--accent); }
    .stat { font-size: 2rem; font-weight: bold; margin: 0.5rem 0; }
    .conversation { color: var(--accent-2); font-style: italic; }
    .empty { color: var(--muted); text-align: center; margin-top: 4rem; }
    .word-list { list-style: none; padding: 0; }
    .word-list li { padding: 0.3rem 0; border-bottom: 1px solid #222; }
  </style>
</head>
<body>
  <h1>LitTCG Parent Progress Report</h1>
  <p class="subtitle">Upload your child's <code>save.json</code> to see how their word journey is going.</p>

  <div class="upload">
    <input type="file" id="saveFile" accept=".json">
  </div>

  <div id="report" class="grid" style="display: none;">
    <div class="card">
      <h2>Rank</h2>
      <div class="stat" id="rank">-</div>
      <p id="className">-</p>
    </div>
    <div class="card">
      <h2>Total XP</h2>
      <div class="stat" id="xp">-</div>
    </div>
    <div class="card">
      <h2>Words Learned</h2>
      <div class="stat" id="words">-</div>
    </div>
    <div class="card">
      <h2>Favorite Element</h2>
      <div class="stat" id="element">-</div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>Conversation Prompt</h2>
      <p class="conversation" id="prompt">-</p>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>Recent Words</h2>
      <ul class="word-list" id="wordList"></ul>
    </div>
  </div>

  <p id="empty" class="empty">No save file loaded yet.</p>

  <script>
    const saveInput = document.getElementById('saveFile');
    const report = document.getElementById('report');
    const empty = document.getElementById('empty');

    saveInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        alert('Could not parse save.json. Please select a valid LitTCG save file.');
        return;
      }
      render(data);
    });

    function render(data) {
      empty.style.display = 'none';
      report.style.display = 'grid';

      const sheet = data.character_sheet || {};
      const spellbook = data.spellbook || { entries: [] };
      const trail = data.word_trail || {};

      const rank = Math.floor((sheet.total_xp || 0) / 1000) + 1;
      document.getElementById('rank').textContent = rank;
      document.getElementById('className').textContent = sheet.emergent_class || 'Newcomer';
      document.getElementById('xp').textContent = sheet.total_xp || 0;
      document.getElementById('words').textContent = spellbook.entries.length;

      // favorite element by counting element occurrences
      const counts = {};
      for (const entry of spellbook.entries) {
        if (entry.element) counts[entry.element] = (counts[entry.element] || 0) + 1;
      }
      const favorite = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
      document.getElementById('element').textContent = favorite ? favorite[0] : 'Neutral';

      // conversation prompt
      const recent = (trail.visited_words || []).slice(-5);
      const prompt = recent.length
        ? `Ask your reader: "Why do you think the word '${recent[recent.length - 1]}' belongs to the ${favorite ? favorite[0] : 'Neutral'} element?"`
        : 'Play a round together and ask which word felt most powerful!';
      document.getElementById('prompt').textContent = prompt;

      const wordList = document.getElementById('wordList');
      wordList.innerHTML = '';
      for (const word of (trail.visited_words || []).slice(-20).reverse()) {
        const li = document.createElement('li');
        li.textContent = word;
        wordList.appendChild(li);
      }
    }
  </script>
</body>
</html>
